services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: deadside
      POSTGRES_USER: deadside
      POSTGRES_PASSWORD: deadside
    volumes:
      - deadside_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deadside -d deadside"]
      interval: 5s
      timeout: 5s
      retries: 12
  api:
    build: .
    environment:
      DATABASE_URL: postgresql+asyncpg://deadside:deadside@db:5432/deadside
      APP_ENV: development
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173
      WEBSOCKET_ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173
      TRUSTED_HOSTS: localhost,127.0.0.1
    ports:
      - "8000:8000"
    volumes:
      - ./sample-data:/data:ro
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
volumes:
  deadside_pgdata:
